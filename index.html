<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Game</title>

<style>
body { margin:0; overflow:hidden; background:#eee; }

#game {
  width:100vw;
  height:100vh;
  position:relative;
  background:#ddd;
}

/* 중앙 레벨 표시 */
#levelText {
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
  font-weight:bold;
  opacity:0;
  pointer-events:none;
}

/* ⭐ 엔딩 (밖으로 이동 + fixed) */
#ending {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;

  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  z-index:9999;
}

#ending img {
  width:150px;
}

.showLevel {
  animation: showLevel 1s;
}

@keyframes showLevel {
  0% { opacity:0; transform:translate(-50%,-60%); }
  30% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-40%); }
}

/* 효과 */
.flash { animation: flash 0.2s; }
.shake { animation: shake 0.3s; }

@keyframes flash {
  0% { background:white; }
  100% { background:transparent; }
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-5px,0); }
  50% { transform: translate(5px,0); }
  75% { transform: translate(-5px,0); }
  100% { transform: translate(0,0); }
}

.player {
  width:60px;
  height:60px;
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  transition: left 0.2s ease;
}

.player img {
  width:100%;
  height:100%;
}

.item, .trap {
  width:50px;
  height:50px;
  position:absolute;
}

.lane-line {
  position:absolute;
  top:0;
  bottom:0;
  width:0;
  border-left:2px dashed rgba(0,0,0,0.2);
}

#ui {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
}

/* 게임오버 */
#gameOver {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  display:none;
}

button {
  margin-top:10px;
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="game">
  <div id="ui">점수: 0 | 레벨: 1 | 시간: 8</div>
  <div id="levelText">LEVEL 1</div>

  <div class="lane-line" style="left:33.33%"></div>
  <div class="lane-line" style="left:66.66%"></div>

  <div id="player" class="player">
    <img id="playerImg" src="gorby1.png">
  </div>

  <!-- 게임오버 -->
  <div id="gameOver">
    <div id="resultText"></div>
    <button onclick="location.reload()">다시하기</button>
  </div>
</div>

<!-- ⭐ 엔딩을 밖으로 이동 -->
<div id="ending">
  <h1>🎉 축하합니다!</h1>
  <img id="endingImg" src="gorby5.png">
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const game = document.getElementById("game");
const player = document.getElementById("player");
const playerImg = document.getElementById("playerImg");
const ui = document.getElementById("ui");
const levelText = document.getElementById("levelText");
const gameOverDiv = document.getElementById("gameOver");
const resultText = document.getElementById("resultText");

const ending = document.getElementById("ending");
const endingImg = document.getElementById("endingImg");

const lanes = [0.2, 0.5, 0.8];
let currentLane = 1;

let items = [];
let score = 0;
let totalScore = 0;
let level = 1;
let timeLeft = 8;
let maxLevel = 1;
let isGameOver = false;
let isEnding = false;

// 걷기 애니메이션
let walkToggle = true;
setInterval(() => {
  if (player.dataset.state === "move") return;
  playerImg.src = walkToggle ? "gorby1.png" : "gorby2.png";
  walkToggle = !walkToggle;
}, 200);

// 이동 이미지
function setMoveImage(dir) {
  player.dataset.state = "move";
  playerImg.src = dir === "left" ? "gorby3.png" : "gorby4.png";
  setTimeout(() => player.dataset.state = "", 200);
}

// 레벨 표시
function showLevelText() {
  levelText.innerText = "LEVEL " + level;
  levelText.classList.add("showLevel");
  setTimeout(() => levelText.classList.remove("showLevel"), 1000);
}

// ⭐ 엔딩
function showEnding() {
  isEnding = true;
  ending.style.display = "flex";

  let toggle = true;
  setInterval(() => {
    endingImg.src = toggle ? "gorby5.png" : "gorby6.png";
    toggle = !toggle;
  }, 300);
}

// 생성
function spawn() {
  if (isGameOver || isEnding) return;

  const el = document.createElement("img");
  const isItem = Math.random() > 0.6;

  const type = isItem
    ? [{img:"item1.png",score:10},{img:"item2.png",score:20},{img:"item3.png",score:30}][Math.floor(Math.random()*3)]
    : [{img:"trap5.png",score:-50},{img:"trap10.png",score:-100}][Math.floor(Math.random()*2)];

  el.src = type.img;
  el.className = isItem ? "item" : "trap";

  const lane = Math.floor(Math.random()*3);
  el.style.left = (lanes[lane] * window.innerWidth) + "px";
  el.style.transform = "translateX(-50%)";
  el.style.top = "-60px";

  game.appendChild(el);

  items.push({ el, y:-60, score:type.score, type: isItem ? "item" : "trap" });
}

// 충돌
function checkCollision(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

// 게임 루프
function gameLoop() {
  if (isGameOver || isEnding) return;

  const speed = 5 + level * 2;

  items.forEach((obj, i) => {
    obj.y += speed;
    obj.el.style.top = obj.y + "px";

    const r1 = player.getBoundingClientRect();
    const r2 = obj.el.getBoundingClientRect();

    if (checkCollision(r1, r2)) {
      score += obj.score;
      totalScore += obj.score;

      if (score < 0) endGame();

      obj.el.remove();
      items.splice(i,1);
    }

    if (obj.y > window.innerHeight) {
      obj.el.remove();
      items.splice(i,1);
    }
  });

  ui.innerText = `점수: ${score} | 레벨: ${level} | 시간: ${timeLeft}`;
}

// 레벨 타이머
setInterval(() => {
  if (isGameOver || isEnding) return;

  timeLeft--;

  if (timeLeft <= 0) {
    if (level === 10) {
      showEnding();
      return;
    }

    level++;
    maxLevel = Math.max(maxLevel, level);
    timeLeft = 8;
    score = 0;
    showLevelText();
  }
}, 1000);

// 종료
function endGame() {
  isGameOver = true;

  resultText.innerHTML = `
    게임오버<br><br>
    최고 레벨: ${maxLevel}<br>
    누적 점수: ${totalScore}
  `;
  gameOverDiv.style.display = "block";
}

// 루프
setInterval(spawn, 800);
setInterval(gameLoop, 30);

// 입력
document.addEventListener("keydown", e => {
  if (isGameOver || isEnding) return;

  if (e.key === "ArrowLeft" && currentLane > 0) {
    currentLane--;
    setMoveImage("left");
    player.style.left = (lanes[currentLane] * window.innerWidth) + "px";
  }
  if (e.key === "ArrowRight" && currentLane < 2) {
    currentLane++;
    setMoveImage("right");
    player.style.left = (lanes[currentLane] * window.innerWidth) + "px";
  }
});

// 시작
player.style.left = (lanes[currentLane] * window.innerWidth) + "px";
showLevelText();

});
</script>

</body>
</html>
